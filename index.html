<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Catena Áurea de Santo Tomás de Aquino — Exposição contínua dos quatro Evangelhos com comentários dos Santos Padres da Igreja.">
  <meta name="author" content="Santo Tomás de Aquino">
  <meta property="og:title" content="Catena Áurea — Santo Tomás de Aquino">
  <meta property="og:description" content="Leia os quatro Evangelhos com os comentários patrísticos compilados por Santo Tomás de Aquino.">
  <meta property="og:type" content="website">
  <title>Catena Áurea — Santo Tomás de Aquino</title>
  <link rel="icon" id="favicon" href="assets/images/favicon-mateus.png?v=20260425-symbol-colors" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Lora:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css?v=20260502-father-names">
</head>
<body>
  <div id="app">

    <!-- ── HEADER ─────────────────────────────────────────── -->
    <header id="header">
      <button class="logo-btn" id="logo-btn" aria-label="Página inicial">
        <div class="logo-mark" id="logo-mark" aria-hidden="true"></div>
        <div class="logo-text">
          <span class="logo-title">Catena Áurea</span>
          <span class="logo-sub">Santo Tomás de Aquino</span>
        </div>
      </button>
      <div class="header-divider" aria-hidden="true"></div>
      <button class="chapter-toggle" id="chapter-toggle" aria-label="Mostrar capítulos" type="button">≡</button>
      <nav id="book-tabs" aria-label="Evangelhos">
        <a class="book-tab" id="tab-mateus" data-book="mateus" href="?evangelho=mateus&amp;capitulo=1" aria-label="Evangelho de São Mateus">
          <span class="tab-symbol" id="sym-mateus" aria-hidden="true"></span>
          São Mateus
        </a>
        <a class="book-tab" id="tab-marcos" data-book="marcos" href="?evangelho=marcos&amp;capitulo=1" aria-label="Evangelho de São Marcos">
          <span class="tab-symbol" id="sym-marcos" aria-hidden="true"></span>
          São Marcos
        </a>
        <a class="book-tab" id="tab-lucas" data-book="lucas" href="?evangelho=lucas&amp;capitulo=1" aria-label="Evangelho de São Lucas">
          <span class="tab-symbol" id="sym-lucas" aria-hidden="true"></span>
          São Lucas
        </a>
        <a class="book-tab" id="tab-joao" data-book="joao" href="?evangelho=joao&amp;capitulo=1" aria-label="Evangelho de São João">
          <span class="tab-symbol" id="sym-joao" aria-hidden="true"></span>
          São João
        </a>
      </nav>
        <a class="book-tab liturgy-tab" id="tab-liturgia" href="?tela=liturgia" aria-label="Liturgia diaria">
          <span class="tab-symbol liturgy-symbol" aria-hidden="true">&#10016;</span>
          <span class="tab-label">Liturgia Di&aacute;ria</span>
        </a>
      <button class="book-tab theme-mode-btn" id="theme-mode-toggle" type="button" aria-label="Alternar modo claro" title="Alternar modo claro">
        <span class="mode-icon" aria-hidden="true"></span>
      </button>
    </header>

    <!-- ── SIDEBAR ────────────────────────────────────────── -->
    <aside id="sidebar" aria-label="Navegação por capítulos">
      <div class="sidebar-header" id="sidebar-label">Capítulos</div>
      <nav id="chapter-list" aria-label="Lista de capítulos"></nav>
    </aside>

    <!-- ── MAIN ───────────────────────────────────────────── -->
    <main id="main">

      <!-- Welcome / Book Gallery -->
      <section id="welcome" aria-label="Galeria dos Evangelhos">
        <div class="welcome-title">
          <h1>Catena Áurea</h1>
          <p>Exposição Contínua sobre os Santos Evangelhos</p>
        </div>
        <a class="welcome-liturgy-link fade-up" id="welcome-liturgia" href="?tela=liturgia">
          <span class="welcome-liturgy-icon" aria-hidden="true">&#10016;</span>
          <span>Liturgia Di&aacute;ria</span>
        </a>
        <div class="book-cards" id="book-cards" role="list"></div>
      </section>

      <!-- Chapter reader -->
      <article id="chapter-view" class="is-hidden" aria-label="Texto do Evangelho"></article>

      <!-- Daily liturgy -->
      <article id="liturgy-view" class="is-hidden" aria-label="Liturgia diaria"></article>

      <!-- Loading indicator -->
      <div id="loading-indicator" class="is-hidden" aria-live="polite">
        <div class="loading-spinner"></div>
        <p>Carregando…</p>
      </div>

    </main>

  </div><!-- #app -->

  <!-- ── COMMENTARY PANEL ─────────────────────────────────── -->
  <aside id="comm-panel" aria-label="Comentários da Catena Áurea" aria-hidden="true">
    <div id="comm-resize" aria-hidden="true"></div>
    <header id="comm-header">
      <div class="comm-meta">
        <div class="comm-book-label" id="comm-book-label">Catena Áurea</div>
        <div class="comm-ref" id="comm-ref"></div>
      </div>
      <div class="comm-actions">
        <button id="comm-maximize" class="comm-control" type="button" aria-label="Maximizar comentários" title="Maximizar comentários" aria-pressed="false">
          <span class="comm-maximize-icon" aria-hidden="true"></span>
        </button>
        <button id="comm-close" class="comm-control" type="button" aria-label="Fechar comentário" title="Fechar comentário">✕</button>
      </div>
    </header>
    <div id="comm-body"></div>
  </aside>

  <!-- ── SCRIPTS ───────────────────────────────────────────── -->
  <script src="assets/js/symbols.js"></script>
  <script src="assets/js/themes.js"></script>
  <script src="assets/js/commentary.js?v=20260502-father-names"></script>
  <script src="assets/js/core/date-utils.js"></script>
  <script src="assets/js/core/text-utils.js?v=20260429-cross-chapter-markers"></script>
  <script src="assets/js/core/bible-utils.js?v=20260502-father-markers"></script>
  <script src="assets/js/core/state.js"></script>
  <script src="assets/js/core/dom.js?v=20260425-comment-panel"></script>
  <script src="assets/js/services/data-service.js"></script>
  <script src="assets/js/renderers/home-renderer.js?v=20260502-routes"></script>
  <script src="assets/js/renderers/chapter-renderer.js"></script>
  <script src="assets/js/renderers/liturgy-renderer.js?v=20260425-marker-fix"></script>
  <script src="assets/js/ui/appearance.js"></script>
  <script src="assets/js/ui/chapter-sidebar.js"></script>
  <script src="assets/js/ui/commentary-panel.js?v=20260502-routes"></script>
  <script src="assets/js/ui/resizable-panel.js"></script>
  <script src="assets/js/app.js?v=20260502-routes"></script>
</body>
</html>
